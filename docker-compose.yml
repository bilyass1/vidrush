services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vidrush
      POSTGRES_USER: vidrush
      POSTGRES_PASSWORD: vidrush
    ports: ["5433:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
volumes:
  postgres_data:
